<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Hệ Thống Giám Sát & Báo Cáo Realtime</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #1a1a2e; color: white; text-align: center; padding: 20px; }
        .container { display: flex; justify-content: center; gap: 20px; margin-top: 30px; flex-wrap: wrap; }
        .card { background: #16213e; border-radius: 15px; padding: 20px; width: 220px; border-top: 5px solid #4ecca3; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        .value { font-size: 40px; font-weight: bold; margin: 10px 0; color: #4ecca3; }
        .unit { font-size: 16px; color: #888; }
        
        /* Style cho phần lịch sử và nút bấm */
        .history-container { margin: 40px auto; max-width: 900px; background: #16213e; padding: 20px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); }
        .header-table { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; border-bottom: 2px solid #30475e; padding-bottom: 10px; }
        table { width: 100%; border-collapse: collapse; color: white; }
        th { background: #1f4068; color: #4ecca3; padding: 12px; border: 1px solid #30475e; }
        td { padding: 10px; border: 1px solid #30475e; text-align: center; }
        tr:nth-child(even) { background: #1b2640; }
        
        .btn-excel { background: #1D6F42; color: white; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-excel:hover { background: #155130; transform: scale(1.05); }
        h2 { color: #4ecca3; margin: 0; }
    </style>
</head>
<body>
    <h1>TRẠM GIÁM SÁT ĐIỆN & KHÓI - TỔ ĐIỆN</h1>
    
    <div class="container">
        <div class="card">
            <div>ĐIỆN ÁP</div>
            <div id="voltage" class="value">--</div>
            <div class="unit">Vôn (V)</div>
        </div>
        <div class="card">
            <div>DÒNG ĐIỆN</div>
            <div id="current" class="value">--</div>
            <div class="unit">mA</div>
        </div>
        <div class="card">
            <div>KHÓI</div>
            <div id="smoke" class="value">--</div>
            <div class="unit">Phần trăm (%)</div>
        </div>
    </div>

    <div class="history-container">
        <div class="header-table">
            <h2>NHẬT KÝ VẬN HÀNH</h2>
            <button class="btn-excel" onclick="exportToExcel()">📥 XU
